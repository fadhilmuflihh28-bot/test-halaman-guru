<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buat & Input Ujian</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
<div class="layout">

    <aside class="sidebar">
        <h3>Guru Panel</h3>
        <nav>
            <a href="dashboard.html">Dashboard</a>
            <a href="buat-dan-input-ujian.html" class="active">Buat Ujian</a>
            <a href="daftar-ujian.html">Daftar Ujian</a>
            <a href="monitoring.html">Monitoring Siswa</a>
            <a href="index.html">Logout</a>
        </nav>
    </aside>

    <main class="main-content">

        <h2>Buat Ujian Baru & Input Soal</h2>

        <!-- Form Judul + Durasi -->
        <form class="form-card" id="examForm">
            <input type="text" placeholder="Judul Ujian" required>
            <input type="number" placeholder="Durasi (menit)" required>
            <button type="submit" class="btn-primary">Buat Ujian</button>
        </form>

        <!-- Form Input Soal (hidden dulu) -->
        <form class="form-card" id="questionForm" style="display:none;">
            <h3>Input Soal</h3>
            <textarea placeholder="Tulis pertanyaan di sini..." required></textarea>

            <input type="text" placeholder="Opsi A" required>
            <input type="text" placeholder="Opsi B" required>
            <input type="text" placeholder="Opsi C" required>
            <input type="text" placeholder="Opsi D" required>
            <input type="text" placeholder="Opsi E" required>

            <select required>
                <option value="">Pilih Jawaban Benar</option>
                <option value="A">A</option>
                <option value="B">B</option>
                <option value="C">C</option>
                <option value="D">D</option>
                <option value="E">E</option>
            </select>

            <button type="submit" class="btn-secondary">Tambah Soal</button>
        </form>

        <!-- Preview Soal -->
        <div class="question-list"></div>

        <!-- Tombol Simpan Ujian -->
        <button id="saveExam" class="btn-primary" style="display:none;">Simpan Ujian</button>

    </main>

</div>

<!-- Firebase & JS -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyCDfLoILU2tnNJYYq6lKi5kDthx8-_dQJY",
    authDomain: "sistem-ujian-online-b07d8.firebaseapp.com",
    projectId: "sistem-ujian-online-b07d8",
    storageBucket: "sistem-ujian-online-b07d8.firebasestorage.app",
    messagingSenderId: "94980257503",
    appId: "1:94980257503:web:9b53977aff4315ab371b6a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ======= Variabel =======
let examId = null;
let examQuestions = [];

const examForm = document.getElementById("examForm");
const questionForm = document.getElementById("questionForm");
const questionListDiv = document.querySelector(".question-list");
const saveBtn = document.getElementById("saveExam");

// ======= Buat Ujian =======
examForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    const title = examForm.querySelector("input[placeholder='Judul Ujian']").value.trim();
    const duration = examForm.querySelector("input[placeholder='Durasi (menit)']").value.trim();

    if(!title || !duration) {
        alert("Judul dan durasi wajib diisi!");
        return;
    }

    try {
        // Simpan metadata ujian
        const docRef = await addDoc(collection(db, "ujian"), {
            title,
            duration: parseInt(duration),
            timestamp: serverTimestamp()
        });
        examId = docRef.id;

        alert("Ujian berhasil dibuat! Sekarang input soal.");
        // Tampilkan form input soal
        questionForm.style.display = "flex";
        saveBtn.style.display = "inline-block";
        examForm.style.display = "none"; // sembunyikan form judul
    } catch(error) {
        alert("Gagal membuat ujian: " + error.message);
    }
});

// ======= Tambah Soal =======
questionForm.addEventListener("submit", (e) => {
    e.preventDefault();

    const questionText = questionForm.querySelector("textarea").value.trim();
    const options = [
        questionForm.querySelector("input[placeholder='Opsi A']").value.trim(),
        questionForm.querySelector("input[placeholder='Opsi B']").value.trim(),
        questionForm.querySelector("input[placeholder='Opsi C']").value.trim(),
        questionForm.querySelector("input[placeholder='Opsi D']").value.trim(),
        questionForm.querySelector("input[placeholder='Opsi E']").value.trim()
    ];
    const correctAnswer = questionForm.querySelector("select").value;

    if(!questionText || !correctAnswer) {
        alert("Pertanyaan dan jawaban benar wajib diisi!");
        return;
    }

    const newQuestion = { question: questionText, options, correctAnswer };
    examQuestions.push(newQuestion);

    // Preview soal
    const card = document.createElement("div");
    card.classList.add("card", "question-card");
    card.innerHTML = `<p><strong>${examQuestions.length}. </strong>${questionText}</p>
                      <small>Jawaban benar: ${correctAnswer}</small>`;
    questionListDiv.appendChild(card);

    // Reset form
    questionForm.reset();
});

// ======= Simpan Ujian + Soal ke Firestore =======
saveBtn.addEventListener("click", async () => {
    if(examQuestions.length === 0) {
        alert("Belum ada soal untuk disimpan!");
        return;
    }

    try {
        for(const q of examQuestions) {
            await addDoc(collection(db, `ujian/${examId}/soal`), {
                question: q.question,
                options: q.options,
                correctAnswer: q.correctAnswer,
                timestamp: serverTimestamp()
            });
        }
        alert("Semua soal berhasil disimpan!");
        examQuestions = [];
        questionListDiv.innerHTML = "";
        saveBtn.style.display = "none";
        questionForm.style.display = "none";
        examForm.style.display = "flex"; // kembali ke form buat ujian baru
    } catch(error) {
        alert("Gagal menyimpan soal: " + error.message);
    }
});
</script>

</body>
</html>
