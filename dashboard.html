<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Guru</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="layout">

    <aside class="sidebar">
        <h3>Guru Panel</h3>

        <nav>
            <a href="dashboard.html" class="active">Dashboard</a>
            <a href="buat-ujian.html">Buat Ujian</a>
            <a href="daftar-ujian.html">Daftar Ujian</a>
            <a href="monitoring.html">Monitoring Siswa</a>
            <a href="index.html">Logout</a>
        </nav>
    </aside>

    <main class="main-content">

        <h2>Dashboard</h2>

        <div class="stats-grid">
            <div class="card stat-card">
                <h3>Jumlah Ujian</h3>
                <p>12</p>
            </div>

            <div class="card stat-card">
                <h3>Ujian Aktif</h3>
                <p>3</p>
            </div>

            <div class="card stat-card">
                <h3>Total Siswa</h3>
                <p>120</p>
            </div>
        </div>

        <h3>Ujian Terbaru</h3>

        <div class="exam-list">
            <div class="card exam-card">
                <h4>Ujian Matematika</h4>
                <p>Durasi: 60 menit</p>
            </div>

            <div class="card exam-card">
                <h4>Ujian Bahasa Inggris</h4>
                <p>Durasi: 45 menit</p>
            </div>
        </div>

    </main>

</div>

</body>
</html>
