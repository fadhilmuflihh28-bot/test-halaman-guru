<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Guru - Sistem Ujian Online</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="login-page">

    <div class="login-container">
        <div class="login-box">
            <h2>Sistem Ujian Online</h2>

            <!-- FORM LOGIN -->
            <form id="loginForm">
                <input type="email" placeholder="Email" required>
                <input type="password" placeholder="Password" required>
                <button type="submit" class="btn-primary">Login</button>
            </form>

            <!-- LINK DAFTAR -->
            <p class="register-text">
                Belum punya akun? <a href="register.html">Daftar di sini</a>
            </p>

        </div>
    </div>

    <!-- FIREBASE -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        // ================== FIREBASE CONFIG ==================
        const firebaseConfig = {
            apiKey: "AIzaSyCDfLoILU2tnNJYYq6lKi5kDthx8-_dQJY",
            authDomain: "sistem-ujian-online-b07d8.firebaseapp.com",
            projectId: "sistem-ujian-online-b07d8",
            storageBucket: "sistem-ujian-online-b07d8.firebasestorage.app",
            messagingSenderId: "94980257503",
            appId: "1:94980257503:web:9b53977aff4315ab371b6a"
        };

        // ================== INIT FIREBASE ==================
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // ================== LOGIN FORM ==================
        const form = document.getElementById("loginForm");

        form.addEventListener("submit", (e) => {
            e.preventDefault();

            const email = form.querySelector("input[type='email']").value;
            const password = form.querySelector("input[type='password']").value;

            signInWithEmailAndPassword(auth, email, password)
                .then(() => {
                    // Login sukses → redirect ke dashboard
                    window.location.href = "dashboard.html";
                })
                .catch((error) => {
                    alert("Login gagal: " + error.message);
                });
        });
    </script>

</body>
</html>
