<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Soal</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="layout">

    <aside class="sidebar">
        <h3>Guru Panel</h3>

        <nav>
            <a href="dashboard.html">Dashboard</a>
            <a href="buat-ujian.html">Buat Ujian</a>
            <a href="daftar-ujian.html">Daftar Ujian</a>
            <a href="monitoring.html">Monitoring Siswa</a>
            <a href="index.html">Logout</a>
        </nav>
    </aside>

    <main class="main-content">

        <h2>Input Soal</h2>

        <form class="form-card">
            <textarea 
                placeholder="Tulis pertanyaan di sini..."
                required
            ></textarea>

            <input type="text" placeholder="Opsi A" required>
            <input type="text" placeholder="Opsi B" required>
            <input type="text" placeholder="Opsi C" required>
            <input type="text" placeholder="Opsi D" required>
            <input type="text" placeholder="Opsi E" required>

            <select required>
                <option value="">Pilih Jawaban Benar</option>
                <option value="A">A</option>
                <option value="B">B</option>
                <option value="C">C</option>
                <option value="D">D</option>
                <option value="E">E</option>
            </select>

            <button type="button" class="btn-secondary">
                Tambah Soal
            </button>
        </form>

        <div class="question-list">
            <div class="card question-card">
                <p><strong>1.</strong> Contoh pertanyaan?</p>
                <small>Jawaban benar: B</small>
            </div>
        </div>

        <button class="btn-primary">
            Simpan Ujian
        </button>

    </main>

</div>

</body>
</html>
